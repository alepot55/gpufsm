name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  cpu:
    name: lint + type + CPU tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (pure-Python, no CUDA)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint + format check)
        run: |
          ruff check src/gpufsm tests
          ruff format --check src/gpufsm tests

      - name: Mypy
        run: mypy src/gpufsm

      - name: Pytest (CPU-only, GPU tests skipped)
        run: pytest -m "not gpu" -q
